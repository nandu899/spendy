name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude') &&
       github.event.comment.user.type != 'Bot')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash(gh pr comment:*),Bash(gh pr review:*),Bash(curl:*)"
          show_full_output: true   # ← add this
          max_turns: 5
          prompt: |
            Review this pull request and post a single summary comment with:
            - Bugs or correctness issues
            - Security concerns
            - Performance problems
            - Suggestions for improvement
            Be concise. Always post your review as a PR comment even if the code looks fine.
